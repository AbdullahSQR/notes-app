services:
  app:
    image: notes-app
    ports:
      - 127.0.0.1:3000:3000
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_USER=root
      - MYSQL_PASSWORD=secret
      - MYSQL_DB=notes
    volumes:
      - "C:/Users/lenovo/notes-app:/app"
      - node_modules:/app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
  
  mysql:
    image: mysql:8.0
    environment: 
      - MYSQL_ROOT_PASSWORD=secret
      - MYSQL_DATABASE=notes
    volumes:
      - note-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  note-mysql-data:
  node_modules: